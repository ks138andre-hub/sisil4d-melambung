    <style amp-boilerplate>
        body {
            -webkit-animation: -amp-start 8s steps(1, end) 0s 1 normal both;

            -ms-animation: -amp-start 8s steps(1, end) 0s 1 normal both;
            animation: -amp-start 8s steps(1, end) 0s 1 normal both
        }

        @-webkit-keyframes -amp-start {
            from {
                visibility: hidden
            }

            to {
                visibility: visible
            }
        }

        @-moz-keyframes -amp-start {
            from {
                visibility: hidden
            }

                visibility: visible
            }
        }

            from {

            }
        }
    </style>

    <style amp-custom>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: monospace;
            position: relative;
            background: #000000;
            background-image: radial-gradient(#272727 5%, transparent 50%);
            background-size: 5px 5px;
            background-attachment: fixed;
        }

        .container {
            max-width: 400px;
            height: auto;
            margin: 0 auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: auto;
        }

        .welcome {
            width: 100%;
            text-align: center;
        }

        .typing-text {
            font-size: 14px;
            color: #fff;
            text-align: center;
            line-height: 1.4;

            display: inline-block;
            max-width: 100%;

            /* ini kunci multi-line */
            white-space: normal;

            /* efek typing */
            overflow: hidden;
            border-right: 2px solid #fbf4a0;

            animation: typing-multi 4s steps(60, end),
                blink-caret 0.7s step-end infinite;
        }

        @media (max-width: 768px) {
            .typing-text {
                font-size: 11px;
                padding: 0 10px;
            }
        }

        /* animasi ketik */
        @keyframes typing-multi {
            from {
                clip-path: inset(0 100% 0 0);
            }

            to {
                clip-path: inset(0 0 0 0);
            }
        }

        /* cursor kedip */
        @keyframes blink-caret {
            50% {
                border-color: transparent;
            }
        }

        .banner {
            border-radius: 10px;
        }

        .btn-login,
        .btn-daftar,
        .btn-livechat {
            padding: 10px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            background: linear-gradient(to bottom, #009997 0%, #000000 100%);
            margin-top: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            position: relative;
            z-index: 2;
        }

        .btn-daftar {
            animation: blink 0.5s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 1;
            }

            75% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .btn-livechat {
            background: linear-gradient(to bottom, #009997 0%, #000000 100%);
        }

        .btn-login {
            background: linear-gradient(to bottom, #009997 0%, #000000 100%);
        }

        .copyright {
            text-align: center;
            color: #ffffff96;
        }

        .nagaterbang {
            position: fixed;
            z-index: 1;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            margin: auto;
        }

        table {
            width: 100%;
            margin-top: 20px;

        }

        th,
        td {
            padding: 5px;
            text-align: center;
            border-radius: 5px;
        }

        th {

            background: linear-gradient(to right, #009997 0%, #000000 100%);
            color: #fff;
            font-size: 16px;
        }

        td {
            background-color: #272727;
            color: #fff;
        }

        td a {
            display: inline-block;
            padding: 5px 5px;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(to bottom, #009997 0%, #000000 100%);
            border-radius: 5px;
            margin: 1px 0;
            font-size: 11px;
            line-height: 0.8;
        }
    </style>
</head>
